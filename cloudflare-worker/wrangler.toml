name = "brainforge-api"
main = "index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[[durable_objects.bindings]]
name = "AGENT_LOOP"
class_name = "AgentLoop"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentLoop"]

[triggers]
crons = ["0 3 * * *"]

[vars]
GITHUB_OWNER = "richardbrownmiami-commits"
GITHUB_REPO = "devforge-ai"
GEMINI_API_KEY = ""
GITHUB_PAT = ""
WORKER_SECRET = ""

