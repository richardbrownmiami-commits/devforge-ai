name: Agent Loop

on:
  workflow_dispatch:
    inputs:
      stop:
        description: "Send stop signal"
        required: false
        default: "false"
        type: boolean

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright and deps
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Handle stop input
        if: ${{ github.event.inputs.stop == 'true' }}
        env:
          GITHUB_PAT: ${{ secrets.AGENT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
        run: |
          echo "Sending STOP signal..."
          curl -s -X PUT \
            -H "Authorization: token $GITHUB_PAT" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/browser-agent/STOP" \
            -d "{\"message\":\"agent-loop: STOP signal\",\"content\":\"$(echo -n STOP | base64)\"}"
          echo "Stop signal sent."
          exit 0

      - name: Run agent loop
        env:
          GITHUB_PAT: ${{ secrets.AGENT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
        run: node browser-agent/run.js

      - name: Check if should re-trigger
        env:
          GITHUB_PAT: ${{ secrets.AGENT_GITHUB_PAT || secrets.GITHUB_TOKEN }}
        run: |
          HOP=$(cat browser-agent/hop-count.txt 2>/dev/null || echo "0")
          STOP_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_PAT" \
            "https://api.github.com/repos/${{ github.repository }}/contents/browser-agent/STOP")
          echo "Hop count: $HOP | Stop file: $STOP_EXISTS"
          if [ "$HOP" -lt "50" ] && [ "$STOP_EXISTS" = "404" ]; then
            echo "Re-triggering workflow for next hop..."
            curl -s -X POST \
              -H "Authorization: token $GITHUB_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/agent-loop.yml/dispatches" \
              -d '{"ref":"main"}'
          else
            echo "Loop complete or stopped."
          fi
