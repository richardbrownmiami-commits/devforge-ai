name: Deploy Bifrost

on:
  push:
    branches: [main]
    paths: ["bifrost/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Bifrost Worker
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: bifrost