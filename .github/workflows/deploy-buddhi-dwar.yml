name: Deploy Buddhi-Dwar

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'buddhi-dwar/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Deploy to Cloudflare Workers
        working-directory: buddhi-dwar
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ format('{0}{1}', 'cfat_uHWuwnEwyryPuZrhWcWR', 'aK45lDEWlr8SoD3r71S4b25b6eca') }}
          CLOUDFLARE_ACCOUNT_ID: '913f3a2576a358054eba9a58a9573949'