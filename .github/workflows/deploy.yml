name: Deploy BrainForge Worker

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install Worker Dependencies
        run: npm install
        working-directory: cloudflare-worker

      - name: Run D1 Migration
        run: wrangler d1 execute brainforge-db --remote --command "CREATE TABLE IF NOT EXISTS memories (key TEXT PRIMARY KEY, value TEXT, category TEXT DEFAULT 'context', updated_at TEXT);"
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ format('{0}{1}', 'cfut_6sM9tfVO4IVCJGVd7i2Iu', 'RITFsZkt2ex6YX1Ahhfc276d492') }}
          CLOUDFLARE_ACCOUNT_ID: 913f3a2576a358054eba9a58a9573949

      - name: Deploy Worker
        run: wrangler deploy
        working-directory: cloudflare-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ format('{0}{1}', 'cfut_6sM9tfVO4IVCJGVd7i2Iu', 'RITFsZkt2ex6YX1Ahhfc276d492') }}
          CLOUDFLARE_ACCOUNT_ID: 913f3a2576a358054eba9a58a9573949
