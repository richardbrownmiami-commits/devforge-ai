name: Set Cloudflare Secret (GITHUB_PAT)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm setting the GITHUB_PAT secret on Cloudflare'
        required: true
        default: 'NO'

jobs:
  set-secret:
    name: Push GITHUB_PAT to Cloudflare Worker
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Set GITHUB_PAT secret on Cloudflare Worker
        working-directory: cloudflare-worker
        run: echo "${{ secrets.GITHUB_PAT_VALUE }}" | wrangler secret put GITHUB_PAT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
