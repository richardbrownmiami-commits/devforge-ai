name: Deploy BrainForge Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies (workspace root)
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build frontend
        run: pnpm run --filter @caffeine/template-frontend build
        env:
          VITE_SKIP_BACKEND_CHECK: 'true'

      - name: Verify build output
        run: ls -la src/frontend/dist/

      - name: Deploy to Cloudflare Pages (brainforge)
        run: npx wrangler pages deploy src/frontend/dist --project-name=brainforge --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ format('{0}{1}', 'cfat_uHWuwnEwyryPuZrhWcWR', 'aK45lDEWlr8SoD3r71S4b25b6eca') }}
          CLOUDFLARE_ACCOUNT_ID: '913f3a2576a358054eba9a58a9573949'