name = "brainforge-api"
main = "brainforge-api.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "brainforge-db"
database_id = "3814a86b-7054-465c-ae64-8bf99019cf6b"

# Daily D1 backup at 2:00 AM UTC
[triggers]
crons = ["0 2 * * *"]

# Required secrets (set via: wrangler secret put GITHUB_TOKEN)
# GITHUB_TOKEN = your GitHub fine-grained token
# GITHUB_REPO = richardbrownmiami-commits/devforge-ai
